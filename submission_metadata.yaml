# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized.
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for code review and architectural discussion during development.
  All scoring logic, rule design, JD signal analysis, honeypot detection
  conditions, and engineering decisions are human-authored.
  sentence-transformers (all-MiniLM-L6-v2) is used as a library for offline
  semantic embeddings — no candidate data was fed to any LLM or external API
  at any stage of ranking.

# ============================================================================
# Approach summary (<=200 words)
# ============================================================================
methodology_summary: |
  RedrankAI is a two-phase offline candidate ranking system for the Senior AI
  Engineer role at Redrob AI.

  Phase 1 (Offline Precompute, ~15 min): The job description and all 100K
  candidate profile summaries are encoded once using all-MiniLM-L6-v2
  (80 MB, CPU-only). Outputs are three .npy files: embeddings, candidate IDs,
  and the JD vector.

  Phase 2 (Timed Ranking, <2 min): rank.py loads the .npy files, computes
  vectorised cosine similarity in NumPy, streams candidates.jsonl, filters
  honeypot profiles, and blends semantic (60%) with rule-based (40%) scores.
  The rule scorer has five components: skills match (35%), career trajectory
  (25%), experience fit (15%), location + notice period (10%), and 23-signal
  behavioural score (15%). Scores are normalised to [0.30, 0.99] with ties
  broken by candidate_id ascending. Output is submission.csv with exactly 100
  rows.

